<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome DBDA Students</title>
    <style>
        /* Reset default browser margins and paddings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 1. Body Styling - Tech-focused Deep Teal/Navy Gradient */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3748;
        }

        /* 2. Card Layout - Sleek white container */
        .welcome-card {
            background: #ffffff;
            padding: 3rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 5px solid #00b4db; /* Accent color border bar at the top */
        }

        /* 3. Typography Styles */
        .welcome-card h1 {
            font-size: 2.4rem;
            color: #0f2027; /* Deep dark teal for the heading */
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .welcome-card p {
            font-size: 1.05rem;
            color: #4a5568;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* 4. Button Styling - Bright Cyan/Teal interactive button */
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: #ffffff;
            padding: 0.9rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 30px; /* Fully rounded capsule style button */
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.3);
        }

        /* Hover interaction */
        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 180, 219, 0.5);
            filter: brightness(1.1); /* Slightly brightens the gradient on hover */
        }
    </style>
</head>
<body>

    <!-- The user interface structure -->
    <div class="welcome-card">
        <h1>Welcome Ai Students!</h1>
        <p>Get ready to dive deep into Ai, databases, and big data architectures. Your journey toward mastering data insights starts here.</p>
        <a href="#" class="cta-button">Access Dashboard</a>
    </div>

</body>
</html>
