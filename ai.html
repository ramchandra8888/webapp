<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <style>
        /* Reset default browser margins and paddings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 1. Body Styling - Centers everything on the screen with a gradient background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333333;
        }

        /* 2. Card Layout - The white content box */
        .welcome-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        /* 3. Typography Styles */
        .welcome-card h1 {
            font-size: 2.2rem;
            color: #4a5568;
            margin-bottom: 1rem;
        }

        .welcome-card p {
            font-size: 1rem;
            color: pink;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        /* 4. Button Styling - Interactive call-to-action */
        .cta-button {
            display: inline-block;
            background-color: #667eea;
            color: #ffffff;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        /* Hover effect to make the button feel alive */
        .cta-button:hover {
            background-color: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(90, 103, 216, 0.4);
        }
    </style>
</head>
<body>

    <!-- The user interface structure -->
    <div class="welcome-card">
        <h1>AI Batch</h1>
        <p>We are absolutely thrilled to have you here. Explore the world of Ai.</p>
        <a href="#" class="cta-button">Get Started</a>
    </div>

</body>
</html>
